spring.application.name=screenmatch
spring.datasource.url=jdbc:postgresql://${SM_DB_HOST}
spring.datasource.username=${SM_DB_USERNAME}
spring.datasource.password=${SM_DB_PASSWORD}
spring.datasource.driver-clas-name=org.postgresql.Driver
hibernate.dialect=org.hibernate.dialect.HSQLDialect

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.format-sql=true